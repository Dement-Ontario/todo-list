<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <meta name="description" content="Basic To-Do List with Subtasks">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>To Do</h1>
    </header>
    <main>

    </main>
    <footer>
        <h2>Input Tasks Here</h2>
        <form id="task-input">
            <input type="text" name="task-text" placeholder="Type in your task here!" required>
            <label for="task-due">Due:</label>
            <input type="date" id="task-due" name="task-date" required>
            <input type="submit" id="submit-task" value="Submit Task">
        </form>
    </footer>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.18/dayjs.min.js" integrity="sha512-FwNWaxyfy2XlEINoSnZh1JQ5TRRtGow0D6XcmAWmYCRgvqOUTnzCxPc9uF35u5ZEpirk1uhlPVA19tflhvnW1g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="js/main.js" type="module"></script>
</body>
</html>
